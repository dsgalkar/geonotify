name: geonotify
description: GeoNotify - Hyper-Local Civic Transparency Engine

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Maps & Geo-fencing
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Notifications
  flutter_local_notifications: ^17.2.4
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.9

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9

  # UI
  flutter_animate: ^4.3.0
  lottie: ^2.7.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9

  # Utilities
  http: ^1.1.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.1
  intl: ^0.18.1
  permission_handler: ^11.1.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  # Uncomment ONLY after creating folders and placing files inside them
  # assets:
  #   - assets/images/
  #   - assets/icons/
